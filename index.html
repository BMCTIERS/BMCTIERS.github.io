<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BMCTIERS</title>
  <style>
    body { background:#000; color:#fff; font-family:Arial; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { padding:8px; border-bottom:1px solid #333; }
    img { width:60px; height:120px; }
    .tag { padding:4px 8px; border:1px solid #0ff; border-radius:6px; }
  </style>
</head>
<body>

<h1>BMCTIERS — Global Tierlist</h1>
<p>Everyone sees the same tiers. Updates appear instantly.</p>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Player</th>
      <th>Skin</th>
      <th>Runner HT</th>
    </tr>
  </thead>
  <tbody id="tierTable"></tbody>
</table>

<script>
  fetch("BMCTIERS.json")
    .then(res => res.json())
    .then(players => {
      const table = document.getElementById("tierTable");
      table.innerHTML = "";

      players.forEach((p, i) => {
        const skin = `https://mc-heads.net/body/${encodeURIComponent(p.name)}/200`;
        const row = `
          <tr>
            <td>${i+1}</td>
            <td>${p.name}</td>
            <td><img src="${skin}"></td>
            <td><span class="tag">${p.gamemode} ${p.runnerTier}</span></td>
          </tr>
        `;
        table.innerHTML += row;
      });
    })
    .catch(err => {
      console.error("Failed to load BMCTIERS.json", err);
    });
</script>

</body>
</html>
